events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------- HTTP (certbot + redirect) ----------------
    server {
        listen 80;
        server_name werbungstafel.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------- HTTPS ----------------
    server {
        listen 443 ssl;
        server_name werbungstafel.org;
        client_max_body_size 20M;
        ssl_certificate     /etc/letsencrypt/live/werbungstafel.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/werbungstafel.org/privkey.pem;

        # React
        location /assets/ {
            root /usr/share/nginx/html;

            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /uploads/ {
            proxy_pass http://backend:8000/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # FastAPI
        location /api/ {
            proxy_pass http://backend:8000; # удалён слэш/ в конце
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}


