services:
  redis3105:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data
  postgres_main3105:
    image: postgres:16.2
    env_file:
      - main.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
  bot:
    build: ./back
    command: python main.py
    restart: always
    env_file: main.env
    depends_on:
      - redis3105
      - postgres_main3105

  backend:
    build: ./back
    restart: always
    env_file: main.env
    volumes:
      - ./back/uploads:/app/uploads
    depends_on:
      - redis3105
      - postgres_main3105

  nginx:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: ftbot-frontend   # ← ВОТ ЭТО КЛЮЧ
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:



